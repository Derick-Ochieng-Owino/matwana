{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ route.name }} — Vehicles</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 400px; margin-bottom: 12px; }
    .vehicle-list { margin-top: 12px; }
  </style>
</head>
<body>
  <div class="content" style="margin-left:260px;">
    <h1>{{ route.name }}</h1>
    <p>{{ route.description }}</p>

    <div id="map"></div>

    <div class="vehicle-list">
      <h3>Vehicles on this route</h3>
      <ul id="vehicles-ul"></ul>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const ROUTE_ID = "{{ route.id }}";
    const map = L.map('map').setView([-1.2921, 36.8219], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    const markers = {};

    async function fetchVehicles(){
      const res = await fetch(`/routes/${ROUTE_ID}/vehicles/`);
      if (!res.ok) return;
      const data = await res.json();
      const ul = document.getElementById('vehicles-ul');
      ul.innerHTML = '';
      data.forEach(v => {
        const li = document.createElement('li');
        li.innerHTML = `${v.registration_number} — ${v.current_passenger_count}/${v.capacity} passengers`;
        ul.appendChild(li);

        if (v.last_lat && v.last_lng){
          const id = v.id;
          if (!markers[id]){
            markers[id] = L.marker([v.last_lat, v.last_lng]).addTo(map).bindPopup(v.registration_number);
          } else {
            markers[id].setLatLng([v.last_lat, v.last_lng]);
          }
        }
      });
    }

    fetchVehicles();
    setInterval(fetchVehicles, 5000);
  </script>
</body>
</html>
