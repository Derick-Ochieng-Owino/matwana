{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Matwana Login</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<div class="container">
    <div class="image"></div>
    <div class="content">
        <div class="signupform">
            <img src="{% static '/images/logo.png' %}" alt="logo" style="height:80px;">
            <p>Login to Matwana</p>
            {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username or Email">
                <input type="password" name="password" placeholder="Password">
                <input type="submit" value="Login">
            </form>
            <p>Create account: <a href="{% url 'signup_choice' %}">Sign up</a></p>
            <p><a href="{% url 'forgot_password' %}">Forgot password?</a></p>
        </div>
    </div>
</div>
</body>
</html>
