{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Passenger Dashboard</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <div class="sidebar">
    <h2 style="color:orange">Matwana</h2>
    <a href="{% url 'passenger_dashboard' %}">Home</a>
    <a href="#">My Trips</a>
    <a href="{% url 'login' %}">Logout</a>
  </div>
  <div class="content">
    <h1>Choose a route</h1>
    <div class="card">
      <ul>
        {% for r in routes %}
          <li>
            <a href="{% url 'passenger_route_view' r.id %}">{{ r.name }}</a>
            - {{ r.description|default:"" }}
          </li>
        {% empty %}
          <li>No routes available</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</body>
</html>
