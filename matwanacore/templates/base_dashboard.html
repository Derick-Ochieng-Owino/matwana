<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Matwana Dashboard{% endblock %}</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: #1a1a1a;
            padding: 20px;
            position: fixed;
            left: 0;
            top: 0;
        }

        .sidebar h2 {
            color: orange;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            margin-bottom: 10px;
            text-decoration: none;
            color: white;
            background: #222;
            border-radius: 6px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: orange;
            color: black;
        }

        .content {
            margin-left: 260px;
            padding: 20px;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            background: orange;
            color: black;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Matwana</h2>
        {% block sidebar_links %}{% endblock %}
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
